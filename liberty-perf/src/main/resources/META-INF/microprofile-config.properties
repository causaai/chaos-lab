# ──────────────────────────────────────────────────────────
# MicroProfile Config properties
# All values can be overridden via environment variables.
# Liberty maps env vars with dots replaced by underscores,
# or via explicit MP_CONFIG_ prefixed vars.
#
# Primary chaos scenario: DB connection pool exhaustion.
#   - DB_MAX_POOL_SIZE=3 (tiny pool)
#   - CHAOS_DB_LEAK_ENABLED=true (connections never returned)
#   - CHAOS_DB_SLOW_QUERY_MS=500 (connections held longer)
# This produces HTTP 503 / connection-timeout errors under moderate
# concurrent load, with NO memory pressure involved.
# ──────────────────────────────────────────────────────────

# ── Chaos: Connection-leak knobs ──────────────────────────
# PRIMARY CHAOS KNOB: when true, DB connections are acquired but never
# returned to the pool, draining it to zero within DB_MAX_POOL_SIZE requests.
# Subsequent callers receive a Liberty "Connection wait timeout exceeded"
# error after DB_CONNECTION_TIMEOUT_MS, which Liberty surfaces as HTTP 503.
chaos.db.leak.enabled=${CHAOS_DB_LEAK_ENABLED:true}

# Artificial per-query sleep in milliseconds.
# 500ms means each connection is held for at least 500ms before the query
# result returns, accelerating pool exhaustion under concurrent load.
chaos.db.slow.query.ms=${CHAOS_DB_SLOW_QUERY_MS:500}

# ── Chaos: Memory-leak knobs ──────────────────────────────
# DISABLED: memory must not be the failure vector.
# The background heap cache is off so heap stays stable under load,
# keeping GC quiet and OOM off the table.
chaos.memory.response.cache.enabled=${CHAOS_MEMORY_CACHE_ENABLED:false}

# Irrelevant when cache is disabled; kept at minimum.
chaos.memory.objects.per.tx=${CHAOS_MEMORY_OBJECTS_PER_TX:1}

# ── Chaos: HTTP large-response knobs ──────────────────────
# DISABLED: large response bodies (256 KB × concurrent users) exhaust
# the JVM heap long before the DB connection pool runs dry, causing GC
# pressure / OOM kills that mask the connection-exhaustion failure mode.
# Keeping this off ensures the RCA points at connection issues, not memory.
chaos.http.large.response.enabled=${CHAOS_HTTP_LARGE_RESPONSE_ENABLED:false}

# Padding kept minimal (4 KB) for when the knob is manually re-enabled
# during testing; at this size it contributes negligible heap pressure.
chaos.http.large.response.kb=${CHAOS_HTTP_LARGE_RESPONSE_KB:4}

---
# ============================================================
# Namespace
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: chaos-test
  labels:
    app.kubernetes.io/part-of: chaos-lab
---
# ============================================================
# ConfigMap — externalised application settings
# Override values here without rebuilding the image.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: liberty-perf-config
  namespace: chaos-test
  labels:
    app: liberty-perf
data:
  # ── Thread pool ──────────────────────────────────────────
  # Core/max kept low so HTTP request threads queue under concurrent load,
  # producing HTTP 503s (thread-pool exhaustion) rather than OOM.
  THREAD_POOL_CORE: "10"
  THREAD_POOL_MAX: "20"

  # ── DB connection pool ───────────────────────────────────
  # PRIMARY CHAOS KNOB: pool deliberately tiny so connections are exhausted
  # under moderate concurrent load, causing HTTP 503 / connection-timeout
  # errors without any memory pressure.
  DB_MAX_POOL_SIZE: "3"
  DB_MIN_POOL_SIZE: "1"
  # Short timeout so callers fail fast with a connection error (not OOM).
  DB_CONNECTION_TIMEOUT_MS: "1000"
  DB_MAX_IDLE_TIME_S: "30"
  DB_REAP_TIME_S: "60"
  DB_AGED_TIMEOUT_S: "600"

  # ── HTTP keep-alive ──────────────────────────────────────
  # persistTimeout kept at Liberty default (30s) — not used as a chaos knob
  # here; the failure scenario is connection pool exhaustion, not heap growth.
  HTTP_MAX_KEEPALIVE_REQUESTS: "100"
  HTTP_PERSIST_TIMEOUT_S: "30"
  # NIO write buffer kept at Liberty default (32 KB) to avoid contributing
  # to heap pressure; the failure mode must be connection errors, not OOM.
  HTTP_RESPONSE_BUFFER_SIZE: "32768"

  # ── Chaos knobs ──────────────────────────────────────────
  # HTTP large-response DISABLED: 256 KB per response × concurrent users
  # exhausts the 384 MiB heap long before the DB pool runs dry.
  # Keeping this off ensures the observed failure is connection errors,
  # not GC pressure / OOM kills.
  CHAOS_HTTP_LARGE_RESPONSE_ENABLED: "false"
  CHAOS_HTTP_LARGE_RESPONSE_KB: "4"

  # DB connection leak — connections are never returned to pool.
  # Combined with DB_MAX_POOL_SIZE=3 this guarantees pool exhaustion within
  # the first few requests, producing HTTP 503 connection-timeout errors.
  CHAOS_DB_LEAK_ENABLED: "true"
  # Slow query simulation adds latency so connections are held longer,
  # accelerating pool exhaustion.
  CHAOS_DB_SLOW_QUERY_MS: "500"
  # Background heap leak DISABLED: we want connection errors, not OOM.
  CHAOS_MEMORY_CACHE_ENABLED: "false"
  # Objects per tx kept at minimum — irrelevant when cache is disabled.
  CHAOS_MEMORY_OBJECTS_PER_TX: "1"
---
# ============================================================
# ConfigMap — jvm.options for OpenJ9 GC / JIT / dump logging
# Mounted into /config/jvm.options inside the Liberty container
# so Liberty reads these flags on every startup.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: liberty-perf-jvm-options
  namespace: chaos-test
  labels:
    app: liberty-perf
data:
  jvm.options: |
    # ── Verbose GC ──────────────────────────────────────────────────────────
    # OpenJ9 XML GC log: 4 rotating files, wraps every 20 000 GC cycles.
    # Retained for observability; should remain quiet under load (no OOM).
    -Xverbosegclog:/logs/verbosegc.%seq.log,4,20000

    # ── JIT compilation trace ────────────────────────────────────────────────
    # Emits one line per method at compile / recompile time, capped at 50 MB.
    -Xjit:verbose={compileStart|compileEnd|recompile|methodRecompilationFailed},vlog=/logs/jit.log,limit=52428800

    # ── Class-loading ────────────────────────────────────────────────────────
    # Prints one line to stdout for every class dynamically loaded/unloaded.
    -verbose:dynload

    # ── Shared class cache — accelerates Liberty startup ────────────────────
    # Caches AOT-compiled classes so pods start within the probe window.
    # Eliminates JIT-throttle startup kills — the only failure at runtime
    # must be HTTP connection pool exhaustion, not startup timeouts.
    -Xshareclasses:name=liberty,cacheDir=/tmp/sharedcache
    -Xscmx64m

    # ── Thread dump on SIGQUIT / crash / abort ───────────────────────────────
    # Trigger: oc exec -n chaos-test <pod> -- kill -3 1
    -Xdump:java:events=user+gpf+abort,file=/dumps/javacore.%Y%m%d.%H%M%S.%pid.txt
---
# ============================================================
# Deployment — main application (3 replicas)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberty-perf
  namespace: chaos-test
  labels:
    app: liberty-perf
    version: "1.0.0"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9080"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: liberty-perf
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: liberty-perf
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9080"
    spec:
      # Non-root container as required by security constraints
      # runAsUser / fsGroup are intentionally omitted — OpenShift assigns
      # a UID from the namespace's allowed range automatically.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: liberty-perf
          image: quay.io/causa-ai-hub/liberty-perf:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: liberty-perf-config
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -XX:+UseContainerSupport
                -XX:MaxRAMPercentage=60
                -Dfile.encoding=UTF-8
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1536Mi"
              cpu: "2000m"
          # Startup probe — 3 minutes (36 × 5s) to let Liberty fully start
          # under adequate CPU, eliminating JIT-throttle startup-probe kills
          # so the only observable failure is HTTP connection errors at runtime.
          startupProbe:
            httpGet:
              path: /health/started
              port: 9080
            failureThreshold: 36
            periodSeconds: 5
            timeoutSeconds: 5
          # Liveness probe — restart if heap > 90%
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe — stop traffic if DB is unreachable
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: dumps
              mountPath: /dumps
            - name: logs
              mountPath: /logs
            - name: jvm-options
              mountPath: /opt/wlp/usr/servers/defaultServer/jvm.options
              subPath: jvm.options
              readOnly: true
      volumes:
        - name: dumps
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: jvm-options
          configMap:
            name: liberty-perf-jvm-options
---
# ============================================================
# Service — ClusterIP for internal access + Prometheus scraping
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: liberty-perf-svc
  namespace: chaos-test
  labels:
    app: liberty-perf
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9080"
spec:
  selector:
    app: liberty-perf
  ports:
    - name: http
      port: 9080
      targetPort: 9080
      protocol: TCP
  type: ClusterIP
---
# ============================================================
# Route — external HTTP access (OpenShift)
# ============================================================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: liberty-perf
  namespace: chaos-test
  labels:
    app: liberty-perf
spec:
  to:
    kind: Service
    name: liberty-perf-svc
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
# ============================================================
# HorizontalPodAutoscaler — scale based on CPU
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: liberty-perf-hpa
  namespace: chaos-test
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: liberty-perf
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
